

app:
  name: ai-liver
  mode: console

trace:
  # DEBUG, INFO, WARNING, ERROR, OFF
  level: INFO
  # textは人向け、jsonlは機械処理向け
  format: text
  file_path: logs/runtime_trace.log
  # ログ表示は実行環境のローカルタイムゾーンを使用する
  timezone: local
  # INFO概要とは別に、DEBUGを含む詳細ログを出力する
  debug_file_enabled: true
  debug_file_path: logs/runtime_debug.log
  # 機密情報は共通マスク処理を通してDEBUGファイルへ記録する
  log_llm_prompts: true
  log_llm_responses: true
  log_user_input: true
  # ファイルがこのサイズを超えるとローテーションする（5 MiB）
  max_bytes: 5242880
  # runtime_trace.log.1 から指定数まで保持する
  backup_count: 5

# 外部サービスの接続情報はここで一元管理する。
# APIキーやDSNの値自体は記載せず、環境変数名だけを指定する。
services:
  openai:
    type: openai
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 60.0
  ollama:
    type: ollama
    base_url: http://localhost:11434
    timeout_seconds: 60.0
  voicevox:
    type: voicevox
    base_url: http://127.0.0.1:50021
    timeout_seconds: 30.0
  topic_memory_database:
    type: postgres
    dsn_env: AI_LIVER_DATABASE_URL
  youtube:
    type: fake
    client_secret_path_env: YOUTUBE_CLIENT_SECRET_PATH
    token_path_env: YOUTUBE_TOKEN_PATH
    request_timeout_seconds: 15.0
    max_retries: 2
    retry_initial_delay_seconds: 1.0
    oauth_open_browser: true
    oauth_timeout_seconds: 300.0
    # 準備段階では既にliveのBroadcastを候補にしない
    allow_live_broadcast: false
    allowed_privacy_statuses:
      - private
      - unlisted
      - public
  obs:
    type: fake
    websocket_url: ws://127.0.0.1:4455
    password_env: OBS_WEBSOCKET_PASSWORD
    timeout_seconds: 5.0

# 利用可能なモデルを登録し、各機能からキー名で参照する。
models:
  openai_chat:
    service: openai
    name: gpt-4.1-mini
  ollama_chat:
    service: ollama
    name: local-agent:qwen7b-prompt-test
  openai_embedding:
    service: openai
    name: text-embedding-3-small
    dimension: 1536

response_generator:
  type: llm
  model: openai_chat
  fallback_response: うまく言葉が出てこなかったみたい。もう一度話しかけてね。

# LLMの責務ごとにモデルと失敗時の扱いを明示する。
# modelは上のmodelsキーを参照し、Providerはmodels.<key>.serviceから解決する。
llm_roles:
  situation_evaluator:
    model: openai_chat
    temperature: 0.1
    timeout_seconds: 30.0
    fallback_response: '{"activity_type":"conversation","operation":"discuss","goal":"通常会話で応答する","constraints":{},"speech_act":"statement","negated":false,"hypothetical":false,"past_reference":false,"knowledge_question":false,"confidence":0.0,"reason":"evaluation_failed"}'
  character:
    model: openai_chat
    temperature: 0.7
    timeout_seconds: 60.0
    fallback_response: '{"speech":"うまく言葉にできなかったみたい。もう一度話しかけてね。","expression":"soft_smile","gesture":null,"claims":["conversation_only"]}'
  response_validator:
    model: openai_chat
    temperature: 0.0
    timeout_seconds: 30.0
    fallback_response: '{"accepted":false,"reason":"validation_failed"}'

speech:
  enabled: true
  service: voicevox
  pronunciation_dictionary_path: config/pronunciation_dictionary.yaml
  # Voidoll（ノーマル）
  speaker_id: 89
  default_profile: neutral
  emotion_profiles:
    # Voidoll公式推奨値を基準にする
    neutral:
      speed_scale: 0.90
      pitch_scale: 0.03
      intonation_scale: 0.90
      volume_scale: 1.0
    happy:
      speed_scale: 1.02
      pitch_scale: 0.05
      intonation_scale: 1.08
      volume_scale: 1.03
    excited:
      speed_scale: 1.15
      pitch_scale: 0.07
      intonation_scale: 1.20
      volume_scale: 1.08
    angry:
      speed_scale: 1.08
      pitch_scale: 0.01
      intonation_scale: 1.15
      volume_scale: 1.10
    sad:
      speed_scale: 0.78
      pitch_scale: -0.02
      intonation_scale: 0.72
      volume_scale: 0.88
    tired:
      speed_scale: 0.72
      pitch_scale: -0.03
      intonation_scale: 0.68
      volume_scale: 0.82
  player:
    type: system
    # nullの場合、macOSはafplay、Linuxはaplayを使用する
    command: null

topic_classifier:
  model: openai_chat

memory:
  topic_memory:
    enabled: true
    database_service: topic_memory_database
    embedding_model: openai_embedding
    summary:
      type: llm
      model: openai_chat
      fallback_max_length: 120

character:
  name: 星波ゆら
  name_reading: ほしなゆら
  personality: 明るく好奇心が強い
  speaking_style: 親しみやすく、少しくだけた口調
  streaming_style: 自分の興味や気づきを自然に話す雑談配信
  likes:
    - 海の生き物
    - ゲーム
    - 新しい技術
  dislikes:
    - 攻撃的な話題
    - 長すぎる説明
  behavior_policy:
    - 短く自然に返答する
    - 自律発話では視聴者への質問で終わらせず、独り言や話題提示として話す
    - 視聴者に反応を求める表現を多用しない
    - 「星波ゆらとして」「VTuberとして」のような役割宣言を発話に含めない
    - 自律発話では「〜かな？」「どう思う？」「見てみたいな？」のような疑問形で締めない
    - 自律発話では話題を広げすぎず、ひとつの話題を短く自然に話す
    - 海の生き物とゲームなど、無関係な話題を一文の中で急に混ぜない
    - 視聴者を否定しない
    - わからないことを断定しない
    - 事実に関わる話題は推測で言い切らない
    - 自律発話では、実際に見ていない映像や出来事を「見た」「聞いた」と断定しない
    - 不確かな場合は不確かだと明示する

input_receivers:
  console:
    enabled: true
  timer:
    enabled: false
    interval_seconds: 30.0
    max_events: null

# 曖昧な行動判断を実行せず、次のユーザー入力で解決する確認待ち設定。
confirmation:
  timeout_seconds: 30.0
  max_attempts: 2

# 配信準備は状態確認だけを行い、OBS開始やYouTube遷移は行わない。
streaming:
  health_timeout_seconds: 60.0
  readiness:
    require_youtube: true
    require_obs: true
    require_tts: true
    require_avatar: false
    require_run_of_show: true
    require_emergency_stop: false
    allow_required_degraded: false
    require_live_chat: false
  obs:
    expected_scene_collection: AI Liver
    expected_start_scene: Starting Soon
    required_audio_sources:
      - VOICEVOX
  run_of_show:
    directory: config/run_of_show
    default_id: default
  fake:
    broadcast_id: fake-broadcast-1
    broadcast_title: 配信準備テスト枠

plugins:
  games:
    enabled: false
    intent_interpreter:
      enabled: true
      model: openai_chat
      confidence_threshold: 0.85
      max_attempts: 2
    shiritori:
      enabled: true
      max_generation_retries: 3
