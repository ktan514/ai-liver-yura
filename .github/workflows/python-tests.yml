name: Python tests

on:
  push:
    branches:
      - "feature/**"
      - "refactor/**"
      - "fix/**"
      - "hotfix/**"
      - "test/**"
      - "ci/**"
      - "chore/**"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches:
      - feature/yura-autonomous-agent-refactor
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-tests-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python 3.10)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pipenv

      - name: Install Pipenv
        run: python -m pip install --disable-pip-version-check pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
        run: pipenv run pytest -q
